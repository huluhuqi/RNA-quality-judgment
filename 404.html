<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>RNA质量判断</title>
    <script>
        // GitHub Pages SPA 404 回退
        // 将 404 页面重定向回首页，保留路径信息
        (function () {
            var base = '/RNA-quality-judgment/';
            var path = location.pathname.replace(base, '');
            if (path && path !== '/') {
                location.replace(base + '#/' + path);
            } else {
                location.replace(base);
            }
        })();
    </script>
</head>
<body>
    <p>正在跳转...</p>
</body>
</html>
